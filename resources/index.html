<!doctype html>
<html>
  <head>
    <title>{{ .title }}</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="stylesheet" href="./css/xterm.css" />
    <link rel="stylesheet" href="./css/xterm_customize.css" />
  </head>
  <body>
    <div id="app">
      <!-- Trigger zone for auto-hide sidebar -->
      <div id="sidebar-trigger"></div>
      <div id="sidebar">
        <div class="sidebar-header">
          <div class="header-host" id="header-host"></div>
          <div class="workspace-selector" id="workspace-selector">
            <span class="workspace-icon" id="workspace-icon">📁</span>
            <span class="workspace-name" id="workspace-name">Default</span>
            <span class="workspace-arrow">▼</span>
            <div class="workspace-dropdown" id="workspace-dropdown">
              <!-- Workspace items will be populated by JavaScript -->
            </div>
          </div>
        </div>
        <div id="session-list">
          <div class="session-loading">Loading sessions...</div>
        </div>
        <!-- IRC Chat Channels Section -->
        <div id="irc-channels-section" class="irc-section" style="display: none;">
          <div class="irc-section-header">
            <span class="irc-section-title">💬 Chat Channels</span>
            <button id="irc-toggle-btn" class="btn-irc-toggle" title="Toggle Channels">▼</button>
          </div>
          <div id="irc-channels-list" class="irc-channels-list">
            <div class="irc-channel-loading">Loading channels...</div>
          </div>
          <div class="irc-input-area">
            <input type="text" id="irc-join-channel" class="irc-input" placeholder="Join #channel...">
            <button id="irc-join-btn" class="btn-irc-join">Join</button>
          </div>
        </div>
        <div class="sidebar-toolbar">
          <button id="nav-back-btn" class="btn-toolbar btn-nav" title="Previous Session (Alt+Left)">◀</button>
          <button id="nav-forward-btn" class="btn-toolbar btn-nav" title="Next Session (Alt+Right)">▶</button>
          <button id="new-folder-btn" class="btn-toolbar btn-folder" title="New Folder">📁</button>
          <button id="new-session-btn" class="btn-toolbar btn-new" title="New Session">+</button>
          <button id="autohide-btn" class="btn-toolbar btn-autohide" title="Toggle Auto-Hide Sidebar">◐</button>
          <button id="fullscreen-btn" class="btn-toolbar btn-fullscreen" title="Toggle Fullscreen (F11)">⛶</button>
        </div>
        <div class="sidebar-footer">{{ .commit }} · {{ .buildAt }}</div>
        <button class="sidebar-toggle" title="Toggle Sidebar">◀</button>
      </div>

      <!-- Floating fullscreen button (visible when sidebar collapsed) -->
      <button id="fullscreen-float" class="btn-fullscreen-float" title="Toggle Fullscreen (F11)">⛶</button>

      <!-- Context menu for sessions -->
      <div id="context-menu" class="context-menu">
        <div class="context-menu-item" data-action="kill">
          <span class="menu-icon">💀</span> Kill Session (Delete zellij)
        </div>
        <div class="context-menu-item" data-action="close">
          <span class="menu-icon">✕</span> Close Tab Only
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="rename">
          <span class="menu-icon">✏️</span> Rename
        </div>
        <div class="context-menu-item context-submenu" data-action="move-workspace">
          <span class="menu-icon">📁</span> Move to Workspace
          <div class="context-submenu-content" id="workspace-submenu">
            <!-- Workspace items will be populated by JavaScript -->
          </div>
        </div>
      </div>

      <!-- Custom confirm dialog (doesn't exit fullscreen) -->
      <div id="confirm-dialog" class="confirm-dialog">
        <div class="confirm-dialog-content">
          <div class="confirm-dialog-message" id="confirm-message"></div>
          <div class="confirm-dialog-buttons">
            <button id="confirm-cancel" class="btn-confirm btn-cancel">Cancel</button>
            <button id="confirm-ok" class="btn-confirm btn-ok">OK</button>
          </div>
        </div>
      </div>

      <!-- Workspace management modal -->
      <div id="workspace-modal" class="workspace-modal">
        <div class="workspace-modal-content">
          <div class="workspace-modal-header">
            <div class="workspace-modal-title" id="workspace-modal-title">New Workspace</div>
            <button class="workspace-modal-close" onclick="sessionManager.hideWorkspaceModal()">×</button>
          </div>
          <div class="workspace-form-group">
            <label class="workspace-form-label">Name</label>
            <input type="text" class="workspace-form-input" id="workspace-name-input" placeholder="Workspace name">
          </div>
          <div class="workspace-form-group">
            <label class="workspace-form-label">Color</label>
            <div class="workspace-color-picker" id="workspace-color-picker">
              <div class="workspace-color-option" data-color="blue" style="background: #4a9eff;"></div>
              <div class="workspace-color-option" data-color="green" style="background: #4ade80;"></div>
              <div class="workspace-color-option" data-color="purple" style="background: #a855f7;"></div>
              <div class="workspace-color-option" data-color="orange" style="background: #f59e0b;"></div>
              <div class="workspace-color-option" data-color="red" style="background: #ef4444;"></div>
              <div class="workspace-color-option" data-color="cyan" style="background: #06b6d4;"></div>
              <div class="workspace-color-option" data-color="pink" style="background: #ec4899;"></div>
              <div class="workspace-color-option" data-color="gray" style="background: #6b7280;"></div>
            </div>
          </div>
          <div class="workspace-form-group" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <button class="btn-confirm btn-cancel" onclick="sessionManager.hideWorkspaceModal()">Cancel</button>
            <button class="btn-confirm btn-ok" id="workspace-save-btn" onclick="sessionManager.saveWorkspace()">Save</button>
          </div>
        </div>
      </div>

      <div id="main">
        <div id="terminal"></div>
        <!-- IRC Chat Container (overlay) -->
        <div id="irc-chat-container" class="irc-chat-container" style="display: none;">
          <div class="irc-chat-header">
            <span id="irc-chat-channel">#general</span>
            <button id="irc-close-btn" class="btn-irc-close" title="Close Chat">✕</button>
          </div>
          <div id="irc-messages" class="irc-messages"></div>
          <div class="irc-chat-input-area">
            <span id="irc-nick-display" class="irc-nick-display">guest</span>
            <input type="text" id="irc-chat-input" class="irc-chat-input" placeholder="Type a message or /help...">
            <button id="irc-send-btn" class="btn-irc-send">Send</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./auth_token.js"></script>
    <script src="./config.js"></script>
    <script src="./js/gotty-bundle.js"></script>

    <script>
      // IRC configuration from server
      var enableIRC = {{ .enableIRC }};
      var ircChannel = "{{ .ircChannel }}";
      var ircNetworkName = "{{ .ircNetworkName }}";
    </script>

    <script>
      // Session Manager for frontend
      class SessionManager {
        constructor() {
          this.sessions = [];
          this.activeSessionId = null;
          this.term = null;
          this.wt = null;
          this.closer = null;
          this.editingId = null;
          this.expandedSessions = new Set();
          this.draggedId = null;
          this.dropTarget = null;
          this.refreshInterval = null;
          // Visit history for navigation
          this.visitHistory = [];
          this.historyIndex = -1;
          // Workspace state
          this.workspaces = [];
          this.activeWorkspaceId = null;
          this.editingWorkspaceId = null;
          this.selectedColor = 'blue';
        }

        init() {
          // Set host display with real-time clock
          const hostElem = document.getElementById('header-host');
          if (hostElem) {
            const updateClock = () => {
              const now = new Date();
              const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
              const dateStr = now.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
              hostElem.textContent = `${window.location.host} | ${dateStr} ${timeStr}`;
            };
            updateClock();
            setInterval(updateClock, 1000);
          }

          // Initialize IRC entry (show if IRC is enabled)
          this.initIRCEntry();

          // Initialize workspace selector
          this.initWorkspaceSelector();

          // Fetch workspaces first, then sessions
          this.fetchWorkspaces();

          // Listen for click on new folder button
          const newFolderBtn = document.getElementById('new-folder-btn');
          if (newFolderBtn) {
            newFolderBtn.addEventListener('click', () => {
              this.createFolder();
            });
          }

          // Listen for click on new session button
          const newSessionBtn = document.getElementById('new-session-btn');
          if (newSessionBtn) {
            newSessionBtn.addEventListener('click', () => {
              this.createSession();
            });
          }

          // Listen for collapse button
          const toggleBtn = document.querySelector('.sidebar-toggle');
          if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
              this.toggleSidebar();
            });
          }

          // Listen for fullscreen button
          const fullscreenBtn = document.getElementById('fullscreen-btn');
          if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', () => {
              this.toggleFullscreen();
            });
          }

          // Listen for floating fullscreen button
          const fullscreenFloatBtn = document.getElementById('fullscreen-float');
          if (fullscreenFloatBtn) {
            fullscreenFloatBtn.addEventListener('click', () => {
              this.toggleFullscreen();
            });
          }

          // Listen for fullscreen changes to update button state
          document.addEventListener('fullscreenchange', () => {
            this.updateFullscreenButton();
          });

          // Listen for F11 key to toggle fullscreen
          // Note: ESC to exit fullscreen is browser behavior and cannot be changed
          // But we can add Shift+ESC as an alternative exit method
          document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
              e.preventDefault();
              this.toggleFullscreen();
            }
            // Shift+ESC also exits fullscreen (alternative to ESC)
            if (e.key === 'Escape' && e.shiftKey && document.fullscreenElement) {
              e.preventDefault();
              document.exitFullscreen();
            }
            // Alt+Left/Right for navigation
            if (e.altKey && e.key === 'ArrowLeft') {
              e.preventDefault();
              this.navigateBack();
            }
            if (e.altKey && e.key === 'ArrowRight') {
              e.preventDefault();
              this.navigateForward();
            }
          });

          // Listen for navigation buttons
          const navBackBtn = document.getElementById('nav-back-btn');
          if (navBackBtn) {
            navBackBtn.addEventListener('click', () => {
              this.navigateBack();
            });
          }

          const navForwardBtn = document.getElementById('nav-forward-btn');
          if (navForwardBtn) {
            navForwardBtn.addEventListener('click', () => {
              this.navigateForward();
            });
          }

          // Setup context menu
          this.setupContextMenu();

          // Setup auto-hide sidebar
          this.setupAutoHide();

          // Restore sidebar state
          const collapsed = localStorage.getItem('sidebar_collapsed') === 'true';
          const sidebar = document.getElementById('sidebar');

          if (collapsed) {
            sidebar.classList.add('collapsed');
            const toggleBtn = document.querySelector('.sidebar-toggle');
            if (toggleBtn) {
              toggleBtn.textContent = '▶';
            }
          }

          // Restore expanded sessions state
          const expanded = localStorage.getItem('expanded_sessions');
          if (expanded) {
            try {
              this.expandedSessions = new Set(JSON.parse(expanded));
            } catch (e) {
              this.expandedSessions = new Set();
            }
          }

          // Initial fetch
          this.fetchSessions();

          // Periodically refresh activity status (every 5 seconds)
          this.refreshInterval = setInterval(() => {
            this.refreshActivity();
          }, 5000);
        }

        // ==================== Workspace Methods ====================

        initWorkspaceSelector() {
          const selector = document.getElementById('workspace-selector');
          const dropdown = document.getElementById('workspace-dropdown');

          if (!selector || !dropdown) return;

          // Toggle dropdown on click
          selector.addEventListener('click', (e) => {
            e.stopPropagation();
            selector.classList.toggle('open');
            dropdown.classList.toggle('visible');
          });

          // Close dropdown on click outside
          document.addEventListener('click', () => {
            selector.classList.remove('open');
            dropdown.classList.remove('visible');
          });

          // Color picker
          document.querySelectorAll('.workspace-color-option').forEach(option => {
            option.addEventListener('click', (e) => {
              e.stopPropagation();
              document.querySelectorAll('.workspace-color-option').forEach(o => o.classList.remove('selected'));
              option.classList.add('selected');
              this.selectedColor = option.dataset.color;
            });
          });
        }

        async fetchWorkspaces() {
          try {
            const response = await fetch('/api/workspaces');
            const data = await response.json();
            this.workspaces = data.workspaces || [];
            this.activeWorkspaceId = data.active_id;

            this.renderWorkspaceDropdown();
            this.updateWorkspaceTheme();

            // Now fetch sessions for active workspace
            this.fetchSessions();
          } catch (error) {
            console.error('Failed to fetch workspaces:', error);
            // Fallback: still try to fetch sessions
            this.fetchSessions();
          }
        }

        renderWorkspaceDropdown() {
          const dropdown = document.getElementById('workspace-dropdown');
          const iconEl = document.getElementById('workspace-icon');
          const nameEl = document.getElementById('workspace-name');

          if (!dropdown) return;

          let html = '';
          this.workspaces.forEach(ws => {
            const isActive = ws.id === this.activeWorkspaceId;
            html += `
              <div class="workspace-dropdown-item ${isActive ? 'active' : ''}" data-workspace-id="${ws.id}" onclick="sessionManager.switchWorkspace('${ws.id}', event)">
                <span class="ws-icon">${ws.icon || '📁'}</span>
                <span class="ws-name">${ws.name}</span>
                ${isActive ? '<span class="ws-check">✓</span>' : ''}
              </div>
            `;
          });

          html += '<div class="workspace-dropdown-divider"></div>';
          html += `
            <div class="workspace-dropdown-item create-workspace" onclick="sessionManager.showWorkspaceModal(null, event)">
              <span class="ws-icon">➕</span>
              <span class="ws-name">New Workspace...</span>
            </div>
          `;

          dropdown.innerHTML = html;

          // Update header
          const activeWs = this.workspaces.find(w => w.id === this.activeWorkspaceId);
          if (activeWs) {
            if (iconEl) iconEl.textContent = activeWs.icon || '📁';
            if (nameEl) nameEl.textContent = activeWs.name;
          }
        }

        updateWorkspaceTheme() {
          const activeWs = this.workspaces.find(w => w.id === this.activeWorkspaceId);
          if (activeWs) {
            document.documentElement.setAttribute('data-workspace-theme', activeWs.color_theme || 'blue');
          } else {
            document.documentElement.setAttribute('data-workspace-theme', 'blue');
          }
        }

        async switchWorkspace(id, event) {
          if (event) event.stopPropagation();

          if (id === this.activeWorkspaceId) {
            // Just close dropdown
            document.getElementById('workspace-selector')?.classList.remove('open');
            document.getElementById('workspace-dropdown')?.classList.remove('visible');
            return;
          }

          try {
            const response = await fetch('/api/workspaces/' + id + '/activate', {
              method: 'PUT'
            });
            if (response.ok) {
              this.activeWorkspaceId = id;
              this.renderWorkspaceDropdown();
              this.updateWorkspaceTheme();
              this.fetchSessions();

              // Clear active session when switching workspace
              this.disconnectTerminal();
              this.activeSessionId = null;
            }
          } catch (error) {
            console.error('Failed to switch workspace:', error);
          }

          // Close dropdown
          document.getElementById('workspace-selector')?.classList.remove('open');
          document.getElementById('workspace-dropdown')?.classList.remove('visible');
        }

        showWorkspaceModal(workspaceId, event) {
          if (event) event.stopPropagation();

          const modal = document.getElementById('workspace-modal');
          const titleEl = document.getElementById('workspace-modal-title');
          const nameInput = document.getElementById('workspace-name-input');

          if (!modal || !titleEl || !nameInput) return;

          this.editingWorkspaceId = workspaceId;

          if (workspaceId) {
            // Edit existing workspace
            const ws = this.workspaces.find(w => w.id === workspaceId);
            titleEl.textContent = 'Edit Workspace';
            nameInput.value = ws?.name || '';
            this.selectedColor = ws?.color_theme || 'blue';
          } else {
            // Create new workspace
            titleEl.textContent = 'New Workspace';
            nameInput.value = '';
            this.selectedColor = 'blue';
          }

          // Update color picker selection
          document.querySelectorAll('.workspace-color-option').forEach(o => {
            o.classList.toggle('selected', o.dataset.color === this.selectedColor);
          });

          modal.classList.add('visible');
          nameInput.focus();
        }

        hideWorkspaceModal() {
          const modal = document.getElementById('workspace-modal');
          if (modal) {
            modal.classList.remove('visible');
          }
          this.editingWorkspaceId = null;
        }

        async saveWorkspace() {
          const nameInput = document.getElementById('workspace-name-input');
          const name = nameInput?.value?.trim();

          if (!name) {
            alert('Please enter a workspace name');
            return;
          }

          try {
            if (this.editingWorkspaceId) {
              // Update existing
              await fetch('/api/workspaces/' + this.editingWorkspaceId, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  name: name,
                  color_theme: this.selectedColor
                })
              });
            } else {
              // Create new
              await fetch('/api/workspaces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  name: name,
                  color_theme: this.selectedColor
                })
              });
            }

            this.hideWorkspaceModal();
            await this.fetchWorkspaces();
          } catch (error) {
            console.error('Failed to save workspace:', error);
          }
        }

        async deleteWorkspace(workspaceId) {
          const ws = this.workspaces.find(w => w.id === workspaceId);
          if (!ws) return;

          // Cannot delete default workspace
          if (workspaceId === 'default') {
            alert('Cannot delete the default workspace');
            return;
          }

          this.showConfirm(`Delete workspace "${ws.name}"? Sessions will be moved to Default.`, async () => {
            try {
              await fetch('/api/workspaces/' + workspaceId, {
                method: 'DELETE'
              });
              await this.fetchWorkspaces();
            } catch (error) {
              console.error('Failed to delete workspace:', error);
            }
          });
        }

        async moveSessionToWorkspace(sessionId, workspaceId) {
          try {
            await fetch('/api/sessions/' + sessionId, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ workspace_id: workspaceId })
            });
            await this.fetchSessions();
          } catch (error) {
            console.error('Failed to move session to workspace:', error);
          }
        }

        // ==================== End Workspace Methods ====================

        async refreshActivity() {
          try {
            const url = this.activeWorkspaceId
              ? '/api/sessions?workspace_id=' + this.activeWorkspaceId
              : '/api/sessions';
            const response = await fetch(url);
            const data = await response.json();
            const newSessions = data.sessions || [];

            // Update activity status without full re-render
            newSessions.forEach(newS => {
              const existing = this.sessions.find(s => s.id === newS.id);
              if (existing) {
                existing.is_active = newS.is_active;
                existing.last_active_ago = newS.last_active_ago;
              }
            });

            // Update activity dots
            newSessions.forEach(s => {
              const dot = document.querySelector(`[data-session-id="${s.id}"] .activity-dot`);
              if (dot) {
                if (s.is_active) {
                  dot.classList.remove('inactive');
                  dot.classList.add('active');
                } else {
                  dot.classList.remove('active');
                  dot.classList.add('inactive');
                }
              }
            });
          } catch (error) {
            // Silently ignore refresh errors
          }
        }

        toggleSidebar() {
          const sidebar = document.getElementById('sidebar');
          const toggleBtn = document.querySelector('.sidebar-toggle');

          sidebar.classList.toggle('collapsed');
          const isCollapsed = sidebar.classList.contains('collapsed');
          localStorage.setItem('sidebar_collapsed', isCollapsed);
          if (toggleBtn) {
            toggleBtn.textContent = isCollapsed ? '▶' : '◀';
          }
          // Show/hide floating fullscreen button
          const floatBtn = document.getElementById('fullscreen-float');
          if (floatBtn) {
            floatBtn.style.display = isCollapsed ? 'flex' : 'none';
          }

          // Fit terminal to new width
          if (this.term && this.term.fitWithSidebarState) {
            this.term.fitWithSidebarState(isCollapsed);
          }
        }

        initHostDisplay() {
          const hostEl = document.getElementById('header-host');
          if (hostEl) {
            hostEl.textContent = window.location.host;
          }
        }

        setupContextMenu() {
          const menu = document.getElementById('context-menu');
          if (!menu) return;

          // Hide menu on click outside
          document.addEventListener('click', () => {
            this.hideContextMenu();
          });

          // Handle menu item clicks
          menu.querySelectorAll('.context-menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
              e.stopPropagation();
              const action = item.dataset.action;
              const sessionId = menu.dataset.sessionId;
              this.hideContextMenu();

              if (!sessionId) return;

              switch (action) {
                case 'kill':
                  this.showConfirm('Permanently delete this zellij session?', () => {
                    this.killSession(sessionId);
                  });
                  break;
                case 'close':
                  this.closeSession(sessionId, { stopPropagation: () => {} });
                  break;
                case 'rename':
                  this.startEdit(sessionId, { stopPropagation: () => {} });
                  break;
              }
            });
          });
        }

        initIRCEntry() {
          // IRC 聊天室初始化
          const ircSectionElem = document.getElementById('irc-channels-section');
          if (!ircSectionElem) return;

          // Check if IRC is enabled (passed from server)
          const ircEnabled = typeof window.enableIRC !== 'undefined' ? window.enableIRC : false;
          const defaultChannel = typeof window.ircChannel !== 'undefined' ? window.ircChannel : '#general';
          const networkName = typeof window.ircNetworkName !== 'undefined' ? window.ircNetworkName : 'GoTTY Network';

          if (ircEnabled) {
            ircSectionElem.style.display = 'block';
            // Initialize IRC client
            this.initIRCClient(defaultChannel, networkName);
          }
        }

        initIRCClient(defaultChannel, networkName) {
          // IRC client state
          this.irc = {
            ws: null,
            nick: 'guest',
            channel: defaultChannel,
            channels: new Set([defaultChannel]),
            connected: false,
            messages: []
          };

          // Setup WebSocket connection
          const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = wsProtocol + '//' + window.location.host + '/irc/ws';
          this.irc.ws = new WebSocket(wsUrl);

          const self = this;

          this.irc.ws.onopen = function() {
            self.irc.connected = true;
            self.addSystemMessage('已连接到 ' + networkName);
            // Auto join default channel
            self.sendIRC({ type: 'join', channel: defaultChannel, timestamp: Date.now() });
          };

          this.irc.ws.onclose = function() {
            self.irc.connected = false;
            self.addSystemMessage('已断开连接，3 秒后重连...');
            setTimeout(() => self.initIRCClient(defaultChannel, networkName), 3000);
          };

          this.irc.ws.onerror = function(error) {
            console.error('IRC WebSocket error:', error);
          };

          this.irc.ws.onmessage = function(event) {
            try {
              const msg = JSON.parse(event.data);
              self.handleIRCMessage(msg);
            } catch (e) {
              console.error('Error parsing IRC message:', e);
            }
          };

          // Setup UI event handlers
          this.setupIRCUI();
        }

        setupIRCUI() {
          const self = this;

          // Toggle channels list
          const toggleBtn = document.getElementById('irc-toggle-btn');
          const channelsList = document.getElementById('irc-channels-list');
          if (toggleBtn && channelsList) {
            toggleBtn.addEventListener('click', function() {
              const isExpanded = channelsList.style.display !== 'none';
              channelsList.style.display = isExpanded ? 'none' : 'block';
              toggleBtn.textContent = isExpanded ? '▶' : '▼';
            });
          }

          // Join channel button
          const joinInput = document.getElementById('irc-join-channel');
          const joinBtn = document.getElementById('irc-join-btn');
          if (joinBtn && joinInput) {
            joinBtn.addEventListener('click', function() {
              const channel = joinInput.value.trim();
              if (channel) {
                self.sendIRC({ type: 'join', channel: channel, timestamp: Date.now() });
                joinInput.value = '';
              }
            });
            joinInput.addEventListener('keypress', function(e) {
              if (e.key === 'Enter') {
                joinBtn.click();
              }
            });
          }

          // Close chat button
          const closeBtn = document.getElementById('irc-close-btn');
          if (closeBtn) {
            closeBtn.addEventListener('click', function() {
              self.hideIRCChat();
            });
          }

          // Send message button
          const sendBtn = document.getElementById('irc-send-btn');
          const chatInput = document.getElementById('irc-chat-input');
          if (sendBtn && chatInput) {
            sendBtn.addEventListener('click', function() {
              self.sendIRCMessage();
            });
            chatInput.addEventListener('keypress', function(e) {
              if (e.key === 'Enter') {
                self.sendIRCMessage();
              }
            });
          }
        }

        sendIRC(msg) {
          if (this.irc.ws && this.irc.ws.readyState === WebSocket.OPEN) {
            this.irc.ws.send(JSON.stringify(msg));
          }
        }

        handleIRCMessage(msg) {
          const self = this;
          switch (msg.type) {
            case 'sys':
              this.addSystemMessage(msg.data);
              // Parse user list
              if (msg.data && msg.data.startsWith('Users in')) {
                const match = msg.data.match(/Users in ([\w#+]+): (.+)/);
                if (match) {
                  const channel = match[1];
                  const users = match[2].split(', ');
                  this.updateChannelUserCount(channel, users.length);
                }
              }
              break;
            case 'irc_out':
              const prefix = msg.tags?.prefix || '';
              const command = msg.command || '';
              switch (command) {
                case 'PRIVMSG':
                  this.addMessage(prefix, msg.data);
                  break;
                case 'JOIN':
                  this.addSystemMessage(prefix + ' 加入了频道');
                  break;
                case 'PART':
                  this.addSystemMessage(prefix + ' 离开了频道');
                  break;
                case 'NICK':
                  this.addSystemMessage(prefix + ' 改名为 ' + (msg.params?.[0] || ''));
                  break;
                case 'TOPIC':
                  this.addSystemMessage('主题：' + msg.data);
                  break;
              }
              break;
            case 'nick':
              if (msg.nick) {
                this.irc.nick = msg.nick;
                document.getElementById('irc-nick-display').textContent = msg.nick;
              }
              break;
          }
        }

        addMessage(nick, text) {
          const messagesElem = document.getElementById('irc-messages');
          if (!messagesElem) return;

          const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
          const div = document.createElement('div');
          div.className = 'irc-message privmsg';
          div.innerHTML = '<span class="time">[' + time + ']</span><span class="nick">&lt;' + nick + '&gt;</span> ' + this.escapeHtml(text);
          messagesElem.appendChild(div);
          messagesElem.scrollTop = messagesElem.scrollHeight;
        }

        addSystemMessage(text) {
          const messagesElem = document.getElementById('irc-messages');
          if (!messagesElem) return;

          const div = document.createElement('div');
          div.className = 'irc-message system';
          div.textContent = '*** ' + text;
          messagesElem.appendChild(div);
          messagesElem.scrollTop = messagesElem.scrollHeight;
        }

        escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        sendIRCMessage() {
          const chatInput = document.getElementById('irc-chat-input');
          if (!chatInput) return;

          const text = chatInput.value.trim();
          if (!text) return;

          if (text.startsWith('/')) {
            // Handle commands
            const parts = text.slice(1).split(' ');
            const cmd = parts[0].toUpperCase();
            const args = parts.slice(1);
            switch (cmd) {
              case 'NICK':
                this.sendIRC({ type: 'nick', nick: args[0] || 'guest', timestamp: Date.now() });
                break;
              case 'JOIN':
                this.sendIRC({ type: 'join', channel: args[0] || this.irc.channel, timestamp: Date.now() });
                break;
              case 'PART':
                this.sendIRC({ type: 'part', channel: args[0] || this.irc.channel, timestamp: Date.now() });
                break;
              case 'MSG':
                this.sendIRC({ type: 'msg', channel: args[0], data: args.slice(1).join(' '), timestamp: Date.now() });
                break;
              case 'HELP':
                this.addSystemMessage('命令：/nick, /join, /part, /msg, /topic, /list, /whois, /quit, /help');
                break;
              default:
                this.sendIRC({ type: 'irc_in', data: text.toUpperCase(), timestamp: Date.now() });
            }
          } else {
            // Send message to current channel
            this.sendIRC({ type: 'msg', channel: this.irc.channel, data: text, timestamp: Date.now() });
          }

          chatInput.value = '';
        }

        showIRCChat(channel) {
          const chatContainer = document.getElementById('irc-chat-container');
          const channelElem = document.getElementById('irc-chat-channel');
          if (chatContainer && channelElem) {
            this.irc.channel = channel || this.irc.channel;
            channelElem.textContent = this.irc.channel;
            chatContainer.style.display = 'flex';
          }
        }

        hideIRCChat() {
          const chatContainer = document.getElementById('irc-chat-container');
          if (chatContainer) {
            chatContainer.style.display = 'none';
          }
        }

        updateChannelUserCount(channel, count) {
          // Update channel item with user count
          const channelItem = document.querySelector('.irc-channel-item[data-channel="' + channel + '"]');
          if (channelItem) {
            let countElem = channelItem.querySelector('.irc-channel-count');
            if (!countElem) {
              countElem = document.createElement('span');
              countElem.className = 'irc-channel-count';
              channelItem.appendChild(countElem);
            }
            countElem.textContent = '(' + count + ')';
          }
        }

        setupAutoHide() {
          const autohideBtn = document.getElementById('autohide-btn');
          const sidebar = document.getElementById('sidebar');
          const trigger = document.getElementById('sidebar-trigger');
          const main = document.getElementById('main');

          if (!autohideBtn || !sidebar) return;

          // Restore auto-hide state
          const autoHideEnabled = localStorage.getItem('sidebar_auto_hide') === 'true';
          if (autoHideEnabled) {
            this.enableAutoHide();
          }

          // Toggle button
          autohideBtn.addEventListener('click', () => {
            const isEnabled = sidebar.classList.contains('auto-hide');
            if (isEnabled) {
              this.disableAutoHide();
            } else {
              this.enableAutoHide();
            }
          });

          // Trigger zone hover
          if (trigger) {
            trigger.addEventListener('mouseenter', () => {
              sidebar.classList.add('visible');
            });
          }

          // Sidebar leave
          sidebar.addEventListener('mouseleave', () => {
            if (sidebar.classList.contains('auto-hide')) {
              sidebar.classList.remove('visible');
            }
          });
        }

        enableAutoHide() {
          const sidebar = document.getElementById('sidebar');
          const autohideBtn = document.getElementById('autohide-btn');

          if (sidebar) {
            sidebar.classList.add('auto-hide');
            document.body.classList.add('sidebar-auto-hide');
          }
          if (autohideBtn) {
            autohideBtn.classList.add('active');
            autohideBtn.title = 'Disable Auto-Hide Sidebar';
          }
          localStorage.setItem('sidebar_auto_hide', 'true');

          // Fit terminal to new width (sidebar is now hidden, so collapsed=true)
          if (this.term && this.term.fitWithSidebarState) {
            this.term.fitWithSidebarState(true);
          }
        }

        disableAutoHide() {
          const sidebar = document.getElementById('sidebar');
          const autohideBtn = document.getElementById('autohide-btn');

          if (sidebar) {
            sidebar.classList.remove('auto-hide', 'visible');
            document.body.classList.remove('sidebar-auto-hide');
          }
          if (autohideBtn) {
            autohideBtn.classList.remove('active');
            autohideBtn.title = 'Enable Auto-Hide Sidebar';
          }
          localStorage.setItem('sidebar_auto_hide', 'false');

          // Fit terminal to new width
          if (this.term && this.term.fitWithSidebarState) {
            const isCollapsed = sidebar && sidebar.classList.contains('collapsed');
            this.term.fitWithSidebarState(isCollapsed);
          }
        }

        toggleFullscreen() {
          if (document.fullscreenElement) {
            document.exitFullscreen();
          } else {
            document.documentElement.requestFullscreen().catch(err => {
              console.error('Failed to enter fullscreen:', err);
            });
          }
        }

        updateFullscreenButton() {
          const isFullscreen = !!document.fullscreenElement;
          const btn = document.getElementById('fullscreen-btn');
          const floatBtn = document.getElementById('fullscreen-float');
          const icon = isFullscreen ? '⛶' : '⛶';
          // Could use different icons for enter/exit if desired
          if (btn) {
            btn.title = isFullscreen ? 'Exit Fullscreen (F11)' : 'Toggle Fullscreen (F11)';
            btn.classList.toggle('active', isFullscreen);
          }
          if (floatBtn) {
            floatBtn.title = isFullscreen ? 'Exit Fullscreen (F11)' : 'Toggle Fullscreen (F11)';
            floatBtn.classList.toggle('active', isFullscreen);

        }

        toggleExpand(sessionId, event) {
          event.stopPropagation();
          if (this.expandedSessions.has(sessionId)) {
            this.expandedSessions.delete(sessionId);
          } else {
            this.expandedSessions.add(sessionId);
          }
          localStorage.setItem('expanded_sessions', JSON.stringify([...this.expandedSessions]));
          this.renderSessionList();
        }

        async fetchSessions() {
          try {
            const url = this.activeWorkspaceId
              ? '/api/sessions?workspace_id=' + this.activeWorkspaceId
              : '/api/sessions';
            const response = await fetch(url);
            const data = await response.json();
            this.sessions = data.sessions || [];
            this.renderSessionList();

            // Auto-select session if none selected
            if (!this.activeSessionId && this.sessions.length > 0) {
              // Try to restore last active session
              const lastSessionId = localStorage.getItem('last_active_session');
              if (lastSessionId) {
                const lastSession = this.sessions.find(s => s.id === lastSessionId && !s.is_folder);
                if (lastSession) {
                  this.setActiveSession(lastSessionId);
                  return;
                }
              }
              // Fallback to first session
              const firstSession = this.findFirstSession();
              if (firstSession) {
                this.setActiveSession(firstSession.id);
              }
            }
          } catch (error) {
            console.error('Failed to fetch sessions:', error);
            this.renderSessionList();
          }
        }

        findFirstSession() {
          // Find first non-folder session (depth-first)
          const rootItems = this.sessions.filter(s => !s.parent_id);
          for (const item of rootItems) {
            if (!item.is_folder) return item;
            const child = this.sessions.find(s => s.parent_id === item.id && !s.is_folder);
            if (child) return child;
          }
          return null;
        }

        async createSession(folderId = null) {
          try {
            const options = {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
            };
            if (folderId) {
              options.body = JSON.stringify({ parent_id: folderId });
            }
            const response = await fetch('/api/sessions', options);
            const data = await response.json();

            if (data.id) {
              if (folderId) {
                this.expandedSessions.add(folderId);
                localStorage.setItem('expanded_sessions', JSON.stringify([...this.expandedSessions]));
              }
              await this.fetchSessions();
              this.setActiveSession(data.id);
            }
          } catch (error) {
            console.error('Failed to create session:', error);
          }
        }

        async createFolder() {
          try {
            const response = await fetch('/api/sessions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ is_folder: true, title: 'New Folder' })
            });
            const data = await response.json();
            if (data.id) {
              await this.fetchSessions();
              // Start editing the folder name
              this.editingId = data.id;
              this.renderSessionList();
            }
          } catch (error) {
            console.error('Failed to create folder:', error);
          }
        }

        async createSessionInFolder(folderId, event) {
          event.stopPropagation();
          await this.createSession(folderId);
        }

        async closeSession(id, event) {
          event.stopPropagation();
          try {
            await fetch('/api/sessions/' + id, {
              method: 'DELETE',
            });

            if (this.activeSessionId === id) {
              this.disconnectTerminal();
              this.activeSessionId = null;
            }

            await this.fetchSessions();

            if (this.sessions.length > 0 && !this.activeSessionId) {
              const firstSession = this.findFirstSession();
              if (firstSession) {
                this.setActiveSession(firstSession.id);
              }
            }
          } catch (error) {
            console.error('Failed to close session:', error);
          }
        }

        async killSession(id) {
          try {
            await fetch('/api/sessions/' + id + '?kill=true', {
              method: 'DELETE',
            });

            if (this.activeSessionId === id) {
              this.disconnectTerminal();
              this.activeSessionId = null;
            }

            await this.fetchSessions();

            if (this.sessions.length > 0 && !this.activeSessionId) {
              const firstSession = this.findFirstSession();
              if (firstSession) {
                this.setActiveSession(firstSession.id);
              }
            }
          } catch (error) {
            console.error('Failed to kill session:', error);
          }
        }

        showContextMenu(id, event) {

          const session = this.sessions.find(s => s.id === id);

          if (!menu || !session || session.is_folder) return;

          // Position menu at cursor
          menu.style.left = event.clientX + 'px';
          menu.style.top = event.clientY + 'px';

                    ${ws.icon} ${ws.name}

            red: '#ef4444',
            cyan: '#06b6d4',

        showConfirm(message, onConfirm) {
          const dialog = document.getElementById('confirm-dialog');
          const messageEl = document.getElementById('confirm-message');
          const cancelBtn = document.getElementById('confirm-cancel');
          const okBtn = document.getElementById('confirm-ok');

          if (!dialog || !messageEl || !cancelBtn || !okBtn) return;

          messageEl.textContent = message;
          dialog.classList.add('visible');

          // Remove old listeners
          const newCancelBtn = cancelBtn.cloneNode(true);
          const newOkBtn = okBtn.cloneNode(true);
          cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
          okBtn.parentNode.replaceChild(newOkBtn, okBtn);

          // Add new listeners
          newCancelBtn.addEventListener('click', () => {
            dialog.classList.remove('visible');
          });

          newOkBtn.addEventListener('click', () => {
            dialog.classList.remove('visible');
            if (onConfirm) onConfirm();
          });

          // Close on escape
          const escHandler = (e) => {
            if (e.key === 'Escape') {
              dialog.classList.remove('visible');
              document.removeEventListener('keydown', escHandler);
            }
          };
          document.addEventListener('keydown', escHandler);
        }

        // Drag and drop handlers
        handleDragStart(id, event) {
          this.draggedId = id;
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', id);

          const draggedSession = this.sessions.find(s => s.id === id);
          const isFolder = draggedSession && draggedSession.is_folder;

          // Mark the dragged item
          event.target.classList.add('dragging');

          if (isFolder) {
            // For folders, create a custom drag image showing the entire group
            const dragImage = this.createFolderDragImage(id);
            if (dragImage) {
              // Set custom drag image (show at cursor position)
              event.dataTransfer.setDragImage(dragImage, 10, 10);
            }
            // Also mark children as being dragged
            const children = this.getAllDescendants(id);
            children.forEach(childId => {
              const childEl = document.querySelector(`.session-item[data-session-id="${childId}"]`);
              if (childEl) childEl.classList.add('dragging-child');
            });
          }
        }

        // Create a visual representation of the folder with its children for dragging
        createFolderDragImage(folderId) {
          const folder = this.sessions.find(s => s.id === folderId);
          if (!folder) return null;

          // Create container for drag image
          const container = document.createElement('div');
          container.style.cssText = 'position: absolute; top: -10000px; left: -10000px; pointer-events: none; z-index: 10000;';

          // Build tree structure for children
          const childrenMap = new Map();
          this.sessions.filter(s => s.parent_id).forEach(child => {
            if (!childrenMap.has(child.parent_id)) {
              childrenMap.set(child.parent_id, []);
            }
            childrenMap.get(child.parent_id).push(child);
          });

          // Sort children by order
          childrenMap.forEach((children, parentId) => {
            children.sort((a, b) => (a.order || 0) - (b.order || 0));
          });

          // Render the folder and its children
          const renderItems = (items, depth = 0) => {
            let html = '';
            items.forEach(item => {
              const children = childrenMap.get(item.id) || [];
              const paddingLeft = depth * 16;
              const icon = item.is_folder ? '📁' : '📄';
              html += `<div style="padding: 4px 8px; padding-left: ${paddingLeft + 8}px; background: rgba(40, 40, 50, 0.95); border-left: 2px solid #4a9eff; white-space: nowrap;">
                <span style="margin-right: 6px;">${icon}</span>
                <span style="color: #fff; font-size: 12px;">${this.escapeHtml(item.title)}</span>
              </div>`;
              if (item.is_folder && children.length > 0) {
                html += renderItems(children, depth + 1);
              }
            });
            return html;
          };

          container.innerHTML = renderItems([folder]);

          document.body.appendChild(container);
          this._dragImage = container;

          return container;
        }

        // Get all descendant IDs of a folder
        getAllDescendants(folderId) {
          const descendants = [];
          const children = this.sessions.filter(s => s.parent_id === folderId);
          children.forEach(child => {
            descendants.push(child.id);
            if (child.is_folder) {
              descendants.push(...this.getAllDescendants(child.id));
            }
          });
          return descendants;
        }

        escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        handleDragEnd(event) {
          event.target.classList.remove('dragging');
          // Remove dragging-child class from all children
          document.querySelectorAll('.dragging-child').forEach(el => {
            el.classList.remove('dragging-child');
          });
          this.draggedId = null;
          // Clear all drag-related styles
          document.querySelectorAll('.drag-over, .drag-insert-before, .drag-insert-after').forEach(el => {
            el.classList.remove('drag-over', 'drag-insert-before', 'drag-insert-after');
          });
          // Remove drag image
          if (this._dragImage) {
            this._dragImage.remove();
            this._dragImage = null;
          }
        }

        handleDragOver(event) {
          event.preventDefault();
          event.dataTransfer.dropEffect = 'move';
        }

        handleDragEnterForReorder(targetId, event) {
          event.preventDefault();
          if (this.draggedId === targetId) return;

          // Prevent dragging a folder into its own descendants
          const dragged = this.sessions.find(s => s.id === this.draggedId);
          if (dragged && dragged.is_folder) {
            const descendants = this.getAllDescendants(this.draggedId);
            if (descendants.includes(targetId)) return;
          }

          const targetEl = event.currentTarget;
          if (!targetEl.classList.contains('session-item')) return;

          // Get current position of dragged item to check if drop position is unchanged
          const currentParentId = dragged ? (dragged.parent_id || '') : '';
          const currentSiblings = this.sessions
            .filter(s => s.parent_id === currentParentId)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          const currentIndex = currentSiblings.findIndex(s => s.id === this.draggedId);
          const currentAfterId = currentIndex > 0 ? currentSiblings[currentIndex - 1].id : '';

          // Determine drop position based on mouse Y position within the element
          const rect = targetEl.getBoundingClientRect();
          const y = event.clientY;
          const midpoint = rect.top + rect.height / 2;

          // Check if target is a folder and mouse is in the center zone (for folder drop)
          const target = this.sessions.find(s => s.id === targetId);
          if (target && target.is_folder) {
            const folderZoneTop = rect.top + rect.height * 0.3;
            const folderZoneBottom = rect.top + rect.height * 0.7;
            if (y >= folderZoneTop && y <= folderZoneBottom) {
              // Check if dropping into the same folder (no change)
              if (targetId === currentParentId) {
                this.dropTarget = null;
                return;
              }
              // Drop into folder
              targetEl.classList.add('drag-over');
              this.dropTarget = { type: 'folder', id: targetId };
              return;
            }
          }

          // Insert before or after
          let parentId = target ? (target.parent_id || '') : '';
          let afterId = '';

          if (y < midpoint) {
            // Insert before target
            const siblings = this.sessions
              .filter(s => s.parent_id === parentId)
              .sort((a, b) => (a.order || 0) - (b.order || 0));
            const targetIndex = siblings.findIndex(s => s.id === targetId);
            if (targetIndex > 0) {
              afterId = siblings[targetIndex - 1].id;
            }
            // Check if this is the same position
            if (parentId === currentParentId && afterId === currentAfterId) {
              this.dropTarget = null;
              return;
            }
            // Clear previous indicators before adding new one
            document.querySelectorAll('.drag-insert-before, .drag-insert-after, .drag-over').forEach(el => {
              el.classList.remove('drag-insert-before', 'drag-insert-after', 'drag-over');
            });
            targetEl.classList.add('drag-insert-before');
            this.dropTarget = { type: 'insert', targetId: targetId, position: 'before' };
          } else {
            // Insert after target
            afterId = targetId;
            // Check if this is the same position
            if (parentId === currentParentId && afterId === currentAfterId) {
              this.dropTarget = null;
              return;
            }
            // Clear previous indicators before adding new one
            document.querySelectorAll('.drag-insert-before, .drag-insert-after, .drag-over').forEach(el => {
              el.classList.remove('drag-insert-before', 'drag-insert-after', 'drag-over');
            });
            targetEl.classList.add('drag-insert-after');
            this.dropTarget = { type: 'insert', targetId: targetId, position: 'after' };
          }
        }

        handleDragLeave(event) {
          // Only remove if leaving the element itself (not entering a child)
          const rect = event.currentTarget.getBoundingClientRect();
          const x = event.clientX;
          const y = event.clientY;
          if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
            event.currentTarget.classList.remove('drag-over', 'drag-insert-before', 'drag-insert-after');
          }
        }

        async handleDropForReorder(event) {
          event.preventDefault();
          event.currentTarget.classList.remove('drag-over', 'drag-insert-before', 'drag-insert-after');

          if (!this.draggedId || !this.dropTarget) return;

          const dragged = this.sessions.find(s => s.id === this.draggedId);
          if (!dragged) return;

          // Get current position of dragged item
          const currentParentId = dragged.parent_id || '';
          const currentSiblings = this.sessions
            .filter(s => s.parent_id === currentParentId)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          const currentIndex = currentSiblings.findIndex(s => s.id === this.draggedId);
          const currentAfterId = currentIndex > 0 ? currentSiblings[currentIndex - 1].id : '';

          if (this.dropTarget.type === 'folder') {
            // Drop into folder
            // Check if dropping into the same folder (no change)
            if (this.dropTarget.id === currentParentId) {
              this.dropTarget = null;
              return;
            }
            // Check if dropping into self (for folder)
            if (this.dropTarget.id === this.draggedId) {
              this.dropTarget = null;
              return;
            }
            // Check if dropping folder into its own descendant
            if (dragged.is_folder) {
              const descendants = this.getAllDescendants(this.draggedId);
              if (descendants.includes(this.dropTarget.id)) {
                this.dropTarget = null;
                return;
              }
            }
            await this.reorderSession(this.draggedId, this.dropTarget.id, '');
          } else if (this.dropTarget.type === 'insert') {
            // Insert before/after target
            const target = this.sessions.find(s => s.id === this.dropTarget.targetId);
            if (!target) return;

            // Determine parent and after_id
            let parentId = target.parent_id || '';
            let afterId = '';

            if (this.dropTarget.position === 'after') {
              afterId = this.dropTarget.targetId;
            } else {
              // Insert before target - find the previous sibling
              const siblings = this.sessions
                .filter(s => s.parent_id === target.parent_id)
                .sort((a, b) => (a.order || 0) - (b.order || 0));
              const targetIndex = siblings.findIndex(s => s.id === target.id);
              if (targetIndex > 0) {
                afterId = siblings[targetIndex - 1].id;
              }
              // If targetIndex is 0, afterId stays empty (insert at beginning)
            }

            // Check if no change (same parent and same position)
            if (parentId === currentParentId && afterId === currentAfterId) {
              this.dropTarget = null;
              return;
            }

            // Check if dropping folder into its own descendant
            if (dragged.is_folder) {
              const descendants = this.getAllDescendants(this.draggedId);
              // If target is a descendant, don't allow
              if (descendants.includes(this.dropTarget.targetId)) {
                this.dropTarget = null;
                return;
              }
              // If parent is a descendant, don't allow
              if (parentId && descendants.includes(parentId)) {
                this.dropTarget = null;
                return;
              }
            }

            await this.reorderSession(this.draggedId, parentId, afterId);
          }

          this.dropTarget = null;
        }

        async reorderSession(sessionId, parentId, afterId) {
          try {
            const response = await fetch('/api/sessions/reorder', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                session_id: sessionId,
                parent_id: parentId || '',
                after_id: afterId || ''
              })
            });
            if (response.ok) {
              // Expand parent folder if moving into one
              if (parentId) {
                this.expandedSessions.add(parentId);
                localStorage.setItem('expanded_sessions', JSON.stringify([...this.expandedSessions]));
              }
              await this.fetchSessions();
            } else {
              console.error('Failed to reorder session:', await response.text());
            }
          } catch (error) {
            console.error('Failed to reorder session:', error);
          }
        }

        renderSessionList() {
          const container = document.getElementById('session-list');
          if (!container) return;

          if (this.sessions.length === 0) {
            container.innerHTML = '<div class="session-empty">No sessions. Click + to create one.</div>';
            return;
          }

          // Build tree structure
          const rootItems = this.sessions.filter(s => !s.parent_id);
          const childrenMap = new Map();
          this.sessions.filter(s => s.parent_id).forEach(child => {
            if (!childrenMap.has(child.parent_id)) {
              childrenMap.set(child.parent_id, []);
            }
            childrenMap.get(child.parent_id).push(child);
          });

          // Assign color indices to folders (root level only)
          let folderColorIndex = 0;
          const folderColors = new Map();
          rootItems.forEach(item => {
            if (item.is_folder) {
              folderColors.set(item.id, folderColorIndex % 6);
              folderColorIndex++;
            }
          });

          // Render recursively
          const renderItems = (items, depth = 0) => {
            let html = '';
            items.forEach(item => {
              const children = childrenMap.get(item.id) || [];
              const hasChildren = children.length > 0 || item.has_children;
              const isExpanded = this.expandedSessions.has(item.id);
              const colorIndex = item.is_folder ? (folderColors.get(item.id) ?? 0) : null;

              html += this.renderItem(item, depth, hasChildren, isExpanded, colorIndex);

              // Children container - also a drop zone if parent is a folder
              if (isExpanded && (children.length > 0 || item.is_folder)) {
                const dropZoneClass = item.is_folder ? 'folder-drop-zone' : '';
                html += `<div class="session-children ${dropZoneClass}" data-parent-id="${item.id}">`;
                html += renderItems(children, depth + 1);
                html += '</div>';
              }
            });
            return html;
          };

          container.innerHTML = renderItems(rootItems);

          // Focus on input if editing
          if (this.editingId) {
            const input = container.querySelector('.session-title-input');
            if (input) {
              input.focus();
              input.select();
            }
          }

          // Add drag and drop event listeners
          container.querySelectorAll('.session-item[draggable="true"]').forEach(el => {
            el.addEventListener('dragstart', (e) => this.handleDragStart(el.dataset.sessionId, e));
            el.addEventListener('dragend', (e) => this.handleDragEnd(e));
            // All session items are drop targets for reorder
            el.addEventListener('dragover', (e) => this.handleDragOver(e));
            el.addEventListener('dragenter', (e) => this.handleDragEnterForReorder(el.dataset.sessionId, e));
            el.addEventListener('dragleave', (e) => this.handleDragLeave(e));
            el.addEventListener('drop', (e) => this.handleDropForReorder(e));
          });
        }

        renderItem(item, depth, hasChildren, isExpanded, colorIndex = null) {
          const isEditing = this.editingId === item.id;
          const isFolder = item.is_folder;

          // Activity indicator (only for non-folder sessions)
          const activityDot = !isFolder
            ? `<div class="activity-dot ${item.is_active ? 'active' : 'inactive'}" title="${item.is_active ? 'Active' : 'Idle'}"></div>`
            : '';

          // Expand button
          const expandBtn = hasChildren
            ? `<button class="session-expand ${isExpanded ? 'expanded' : ''}" onclick="sessionManager.toggleExpand('${item.id}', event)" title="Expand/Collapse">▶</button>`
            : '<div class="session-expand-placeholder"></div>';

          // Title
          const titleHtml = isEditing
            ? `<input class="session-title-input" data-session-id="${item.id}" value="${item.title}" onkeydown="sessionManager.finishEdit(event)" onblur="sessionManager.editingId=null;sessionManager.renderSessionList()">`
            : `<div class="session-title">${item.title}</div>`;

          // Subtitle (only for sessions, not folders)
          const subtitleHtml = !isFolder && item.subtitle
            ? `<div class="session-subtitle">${item.subtitle}</div>`
            : '';

          // Workdir (only for sessions)
          const workdirHtml = !isFolder && item.workdir
            ? `<div class="session-workdir" title="${item.workdir}">${item.workdir}</div>`
            : '';

          // Add session button (only for folders)
          const addBtn = isFolder
            ? `<button class="btn-add-child" onclick="sessionManager.createSessionInFolder('${item.id}', event)" title="Add session to folder">+</button>`
            : '';

          // Item classes
          const itemClasses = [
            'session-item',
            item.id === this.activeSessionId ? 'active' : '',
            isFolder ? 'folder' : '',
            isFolder && colorIndex !== null ? `folder-color-${colorIndex}` : '',
            depth > 0 ? 'child' : ''
          ].filter(Boolean).join(' ');

          // Draggable attribute (both sessions and folders are draggable)
          const draggableAttr = 'draggable="true"';

          // Click handler (folders don't connect to terminal)
          const clickHandler = isFolder
            ? `onclick="sessionManager.toggleExpand('${item.id}', event)"`
            : `onclick="sessionManager.setActiveSession('${item.id}')"`;

          // Context menu handler (only for sessions, not folders)
          const contextHandler = !isFolder
            ? `oncontextmenu="sessionManager.showContextMenu('${item.id}', event)"`
            : '';

          // Folder data attribute for drop target
          const folderAttr = isFolder ? `data-folder-id="${item.id}"` : '';

          return `
            <div class="${itemClasses}"
                 data-session-id="${item.id}"
                 ${folderAttr}
                 ${draggableAttr}
                 ${clickHandler}
                 ${contextHandler}>
              ${activityDot}
              ${expandBtn}
              <div class="session-info">
                ${titleHtml}
                ${subtitleHtml}
                ${workdirHtml}
              </div>
              <div class="session-actions">
                ${addBtn}
                <button class="btn-edit" onclick="sessionManager.startEdit('${item.id}', event)" title="Rename">✏️</button>
                <button class="btn-close" onclick="sessionManager.closeSession('${item.id}', event)" title="Close">×</button>
              </div>
            </div>
          `;
        }

        setActiveSession(id, skipHistory = false) {
          const session = this.sessions.find(s => s.id === id);
          if (!session || session.is_folder) return;

          if (this.activeSessionId !== id) {
            // Record visit history (only when user actively clicks)
            if (!skipHistory && this.activeSessionId) {
              // Remove any forward history
              this.visitHistory = this.visitHistory.slice(0, this.historyIndex + 1);
              // Add current to history
              this.visitHistory.push(this.activeSessionId);
              this.historyIndex = this.visitHistory.length - 1;
            }

            this.disconnectTerminal();
            this.activeSessionId = id;
            this.connectTerminal(id);

            // Save last active session to localStorage
            localStorage.setItem('last_active_session', id);
          }

          document.querySelectorAll('.session-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.sessionId === id) {
              item.classList.add('active');
            }
          });

          this.updateNavButtons();
        }

        navigateBack() {
          if (this.historyIndex >= 0) {
            const prevId = this.visitHistory[this.historyIndex];
            this.historyIndex--;
            // Navigate without adding to history
            this.navigateToSession(prevId);
          }
        }

        navigateForward() {
          if (this.historyIndex < this.visitHistory.length - 1) {
            this.historyIndex++;
            const nextId = this.visitHistory[this.historyIndex];
            // Navigate without adding to history
            this.navigateToSession(nextId);
          }
        }

        navigateToSession(id) {
          const session = this.sessions.find(s => s.id === id);
          if (!session || session.is_folder) return;

          if (this.activeSessionId !== id) {
            this.disconnectTerminal();
            this.activeSessionId = id;
            this.connectTerminal(id);
          }

          document.querySelectorAll('.session-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.sessionId === id) {
              item.classList.add('active');
            }
          });

          this.updateNavButtons();
        }

        updateNavButtons() {
          const backBtn = document.getElementById('nav-back-btn');
          const forwardBtn = document.getElementById('nav-forward-btn');

          if (backBtn) {
            backBtn.disabled = this.historyIndex < 0;
            backBtn.style.opacity = this.historyIndex < 0 ? '0.4' : '1';
          }
          if (forwardBtn) {
            forwardBtn.disabled = this.historyIndex >= this.visitHistory.length - 1;
            forwardBtn.style.opacity = this.historyIndex >= this.visitHistory.length - 1 ? '0.4' : '1';
          }
        }

        disconnectTerminal() {
          if (this.closer) {
            this.closer();
            this.closer = null;
          }
          if (this.term) {
            if (this.term.close) {
              this.term.close();
            } else if (this.term.deactivate) {
              this.term.deactivate();
            }
            this.term = null;
          }
          if (this.wt) {
            this.wt = null;
          }
          const elem = document.getElementById('terminal');
          if (elem) {
            elem.innerHTML = '';
          }
        }

        connectTerminal(sessionId) {
          var authToken = '';
          if (typeof gotty_auth_token !== 'undefined') {
            authToken = gotty_auth_token;
          }

          var termType = 'xterm';
          if (typeof gotty_term !== 'undefined') {
            termType = gotty_term;
          }

          const elem = document.getElementById('terminal');
          if (!elem) return;

          let term;
          if (termType === 'hterm') {
            term = new window.Hterm(elem);
          } else {
            term = new window.Xterm(elem);
          }

          const httpsEnabled = window.location.protocol === 'https:';
          const baseUrl = (httpsEnabled ? 'wss://' : 'ws://') + window.location.host + window.location.pathname;
          const wsUrl = baseUrl + 'ws?session_id=' + sessionId;
          const args = window.location.search;
          const factory = new window.ConnectionFactory(wsUrl, ['webtty']);
          const wt = new window.WebTTY(term, factory, args, authToken);

          this.term = term;
          this.wt = wt;
          this.closer = wt.open();

          term.showMessage('Connecting...', 10000);
        }

        getActiveSessionId() {
          return this.activeSessionId;
        }
      }

      // Initialize session manager after all scripts loaded
      let sessionManager;
      window.addEventListener('load', function() {
        sessionManager = new SessionManager();
        sessionManager.init();
        window.sessionManager = sessionManager;
      });
    </script>
  </body>
</html>
